<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ví giấy tờ</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #ffffff;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  .wallet-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .wallet-icon {
    width: 48px;
    height: 48px;
    color: #1f4e4a;
  }

  .wallet-label {
    font-size: 13px;
    color: #2b2b2b;
  }
</style>
</head>
<body>

  <div class="wallet-item">
    <svg class="wallet-icon" viewBox="0 0 32 32" fill="none"
         stroke="currentColor" stroke-width="1.8"
         stroke-linecap="round" stroke-linejoin="round">

      <!-- (3) Hình phía sau — bo góc tròn hơn (rx=2.5) -->
      <rect x="5" y="6" width="12" height="5" rx="2.5"/>

      <!-- (1) Thân ví chính — bo góc to (rx=4) -->
      <rect x="5" y="10" width="20" height="16" rx="4" fill="#ffffff"/>

      <!-- (4) Thanh ngang -->
      <line x1="9" y1="15" x2="18" y2="15"/>

      <!-- (2) Nút bên phải — bo góc tròn hơn cho đồng bộ (rx=1.5) -->
      <rect x="23" y="16" width="5" height="4" rx="1.5" fill="#ffffff"/>

    </svg>
    <span class="wallet-label">Ví giấy tờ</span>
  </div>

</body>
</html>
